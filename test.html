<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Beat Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(to bottom,#ff9aa2,#ffd1dc);
    position:relative;
}

/* Floating Hearts */
.floating{
    position:absolute;
    font-size:30px;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

/* Main Heart */
.heart{
    visibility:hidden;
    position:relative;
    width:300px;
    height:300px;
    transform:rotate(-45deg);
    overflow:hidden;
    animation:beat 1s infinite;
   
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:inherit;
    border-radius:50%;
}

.heart::before{
    top:-150px;
    left:0;
}

.heart::after{
    top:0;
    left:150px;
}

/* Image inside heart */
.heart img{
    width:300px;
    height:300px;
    object-fit:cover;

    clip-path: path('M150,75 C150,30 60,30 60,105 C60,180 150,240 150,270 C150,240 240,180 240,105 C240,30 150,30 150,75 Z');
}

/* Heart beat animation */
@keyframes beat{
    0%,100%{
        transform:rotate(-45deg) scale(1);
    }
    50%{
        transform:rotate(-45deg) scale(1.12);
    }
}

/* Text */
.text{
    position:absolute;
    bottom:60px;
    font-size:40px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 15px #ff1493;
}
</style>
</head>

<body>

<!-- Floating Hearts -->
<div class="floating" style="left:5%;animation-duration:8s;">💖</div>
<div class="floating" style="left:15%;animation-duration:10s;">💕</div>
<div class="floating" style="left:25%;animation-duration:7s;">💗</div>
<div class="floating" style="left:35%;animation-duration:9s;">💘</div>
<div class="floating" style="left:50%;animation-duration:11s;">💞</div>
<div class="floating" style="left:65%;animation-duration:8s;">💖</div>
<div class="floating" style="left:75%;animation-duration:12s;">💕</div>
<div class="floating" style="left:85%;animation-duration:9s;">💗</div>
<div class="floating" style="left:95%;animation-duration:10s;">💘</div>

<!-- Heart with image -->
<div class="heart">
    <img src="img/1.jpeg" alt="Love">
</div>

<div class="text">
    Happy Birthday ❤️
</div>

</body>
</html>
