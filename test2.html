
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Beat Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    position:relative;
}

/* Main Heart */
.heart{
    width:350px;
    height:350px;
    animation:beat 1s infinite;
    z-index:10;
    filter:drop-shadow(0 0 25px rgba(255,255,255,.8));
}

.heart img{
    width:100%;
    height:100%;
    object-fit:cover;

    clip-path:path("
    M 175,90
    C 175,35 70,35 70,125
    C 70,210 175,280 175,320
    C 175,280 280,210 280,125
    C 280,35 175,35 175,90
    Z
    ");
}

@keyframes beat{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.12);
    }
}

/* Floating Hearts */
.floating-heart{
    position:absolute;
    font-size:25px;
    pointer-events:none;
    animation:float linear forwards;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0.5);
        opacity:1;
    }
    to{
        transform:translateY(-100px) scale(1.5);
        opacity:0;
    }
}

/* Click Effect */
.click-heart{
    position:absolute;
    font-size:24px;
    pointer-events:none;
    animation:explode 1s forwards;
}

@keyframes explode{
    0%{
        transform:scale(0);
        opacity:1;
    }
    100%{
        transform:translateY(-120px) scale(2);
        opacity:0;
    }
}

/* Text */
.text{
    position:absolute;
    bottom:50px;
    font-size:40px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 20px #ff1493;
}
</style>
</head>

<body>

<div class="heart">
    <img src="img/1.jpeg" alt="Love">
</div>

<div class="text">❤️ I Love You ❤️</div>

<script>

// Floating Hearts Generator
setInterval(() => {
    const heart = document.createElement("div");

    heart.className = "floating-heart";
    heart.innerHTML = ["💖","💕","💗","💘","💝"][Math.floor(Math.random()*5)];

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (5 + Math.random()*5) + "s";
    heart.style.fontSize = (20 + Math.random()*30) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    },10000);

},400);


// Click Heart Explosion
document.addEventListener("click",(e)=>{

    for(let i=0;i<12;i++){

        const h=document.createElement("div");
        h.className="click-heart";
        h.innerHTML="❤️";

        h.style.left=(e.clientX + Math.random()*100 - 50)+"px";
        h.style.top=(e.clientY + Math.random()*100 - 50)+"px";

        document.body.appendChild(h);

        setTimeout(()=>{
            h.remove();
        },1000);
    }
});

</script>

</body>
</html>
